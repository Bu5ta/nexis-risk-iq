kind = "web"
previewPath = "/"
title = "NEXIS Risk & Control Intelligence"
version = "1.0.0"
id = "artifacts/nexis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18139

[services.development]
run = "pnpm --filter @workspace/nexis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexis", "run", "build" ]
publicDir = "artifacts/nexis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18139"
BASE_PATH = "/"
