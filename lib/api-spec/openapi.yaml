openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NEXIS Risk-IQ API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenants
    description: Tenant operations
  - name: dashboard
    description: Dashboard operations
  - name: controls
    description: Control operations
  - name: departments
    description: Department operations
  - name: audit
    description: Audit trail operations
  - name: reports
    description: Report operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all tenants
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"

  /tenants/{tenantId}/dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get executive dashboard for a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

  /tenants/{tenantId}/kpis:
    get:
      operationId: getKpis
      tags: [dashboard]
      summary: Get KPIs for a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: KPI data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiSummary"

  /tenants/{tenantId}/departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List departments for a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a new department
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Created department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /tenants/{tenantId}/departments/{departmentId}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get department detail
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: departmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Department detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentDetail"
    put:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: departmentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "200":
          description: Updated department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /controls:
    get:
      operationId: listControls
      tags: [controls]
      summary: List controls for a tenant
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: riskLevel
          in: query
          schema:
            type: string
        - name: withinAppetite
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of controls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Control"
    post:
      operationId: createControl
      tags: [controls]
      summary: Create a new control
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ControlInput"
      responses:
        "201":
          description: Created control
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Control"

  /controls/{controlId}:
    get:
      operationId: getControl
      tags: [controls]
      summary: Get control detail
      parameters:
        - name: controlId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Control detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlDetail"
    patch:
      operationId: updateControl
      tags: [controls]
      summary: Perform a named action on a control
      parameters:
        - name: controlId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ControlUpdate"
      responses:
        "200":
          description: Updated control
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Control"
    put:
      operationId: updateControlFields
      tags: [controls]
      summary: Update control field values
      parameters:
        - name: controlId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ControlFieldUpdate"
      responses:
        "200":
          description: Updated control
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Control"
    delete:
      operationId: deleteControl
      tags: [controls]
      summary: Delete a control
      parameters:
        - name: controlId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /controls/{controlId}/notes:
    post:
      operationId: addControlNote
      tags: [controls]
      summary: Add a note to a control
      parameters:
        - name: controlId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /controls/{controlId}/actions:
    post:
      operationId: performControlAction
      tags: [controls]
      summary: Perform an action on a control
      parameters:
        - name: controlId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ControlActionInput"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlActionResult"

  /audit-log:
    get:
      operationId: listAuditLog
      tags: [audit]
      summary: List audit trail for a tenant
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: actor
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogPage"

  /tenants/{tenantId}/controls/import:
    post:
      operationId: importControls
      tags: [controls]
      summary: Bulk import controls from client-parsed CSV/Excel
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportControlsInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportControlsResult"

  /tenants/{tenantId}/controls/export:
    get:
      operationId: exportControls
      tags: [controls]
      summary: Export controls as CSV
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /tenants/{tenantId}/reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List available reports for a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
    post:
      operationId: generateReport
      tags: [reports]
      summary: Generate a new report
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Generated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportDetail"

  /tenants/{tenantId}/reports/{reportId}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a specific report
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: reportId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Report detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportDetail"

  /tenants/{tenantId}/users:
    get:
      operationId: listUsers
      tags: [tenants]
      summary: List users for a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /tenants/{tenantId}/activity:
    get:
      operationId: listActivity
      tags: [dashboard]
      summary: Get recent activity feed for a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sector:
          type: string
        logo:
          type: ["string", "null"]
        primaryColor:
          type: string
        description:
          type: string
        totalUsers:
          type: integer
        totalDepartments:
          type: integer
      required: [id, name, sector, primaryColor, description, totalUsers, totalDepartments]

    KpiSummary:
      type: object
      properties:
        totalRisks:
          type: integer
        controlsInProgress:
          type: integer
        overdueActions:
          type: integer
        highRiskItems:
          type: integer
        complianceRate:
          type: number
        appetiteBreaches:
          type: integer
        implementedControls:
          type: integer
        totalControls:
          type: integer
        awaitingReview:
          type: integer
        escalatedItems:
          type: integer
      required:
        - totalRisks
        - controlsInProgress
        - overdueActions
        - highRiskItems
        - complianceRate
        - appetiteBreaches
        - implementedControls
        - totalControls
        - awaitingReview
        - escalatedItems

    Dashboard:
      type: object
      properties:
        kpis:
          $ref: "#/components/schemas/KpiSummary"
        riskByDepartment:
          type: array
          items:
            $ref: "#/components/schemas/DepartmentRiskSummary"
        implementationTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        riskLevelBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/RiskLevelCount"
        insights:
          type: array
          items:
            type: string
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEntry"
      required:
        - kpis
        - riskByDepartment
        - implementationTrend
        - riskLevelBreakdown
        - insights
        - recentActivity

    DepartmentRiskSummary:
      type: object
      properties:
        department:
          type: string
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        total:
          type: integer
        complianceRate:
          type: number
      required: [department, high, medium, low, total, complianceRate]

    TrendPoint:
      type: object
      properties:
        month:
          type: string
        implemented:
          type: integer
        inProgress:
          type: integer
        overdue:
          type: integer
      required: [month, implemented, inProgress, overdue]

    RiskLevelCount:
      type: object
      properties:
        level:
          type: string
        count:
          type: integer
        percentage:
          type: number
      required: [level, count, percentage]

    Department:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        head:
          type: string
        totalRisks:
          type: integer
        totalControls:
          type: integer
        highRiskCount:
          type: integer
        overdueCount:
          type: integer
        complianceRate:
          type: number
        status:
          type: string
      required:
        - id
        - name
        - head
        - totalRisks
        - totalControls
        - highRiskCount
        - overdueCount
        - complianceRate
        - status

    DepartmentDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        head:
          type: string
        description:
          type: string
        complianceRate:
          type: number
        controls:
          type: array
          items:
            $ref: "#/components/schemas/Control"
        riskBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/RiskLevelCount"
        overdueItems:
          type: array
          items:
            $ref: "#/components/schemas/Control"
        accountability:
          type: array
          items:
            $ref: "#/components/schemas/AccountabilityEntry"
      required:
        - id
        - name
        - head
        - description
        - complianceRate
        - controls
        - riskBreakdown
        - overdueItems
        - accountability

    AccountabilityEntry:
      type: object
      properties:
        owner:
          type: string
        controlCount:
          type: integer
        overdueCount:
          type: integer
        complianceRate:
          type: number
      required: [owner, controlCount, overdueCount, complianceRate]

    Control:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        department:
          type: string
        departmentId:
          type: string
        risk:
          type: string
        riskId:
          type: string
        control:
          type: string
        controlOwner:
          type: string
        implementationDate:
          type: string
        residualRiskScore:
          type: number
        withinAppetite:
          type: boolean
        overallRiskLevel:
          type: string
        implementationStatus:
          type: string
        lastReviewed:
          type: ["string", "null"]
        noteCount:
          type: integer
        isEscalated:
          type: boolean
        escalatedAt:
          type: ["string", "null"]
      required:
        - id
        - tenantId
        - department
        - departmentId
        - risk
        - riskId
        - control
        - controlOwner
        - implementationDate
        - residualRiskScore
        - withinAppetite
        - overallRiskLevel
        - implementationStatus
        - noteCount
        - isEscalated

    ControlDetail:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        department:
          type: string
        departmentId:
          type: string
        risk:
          type: string
        riskId:
          type: string
        control:
          type: string
        controlOwner:
          type: string
        implementationDate:
          type: string
        residualRiskScore:
          type: number
        withinAppetite:
          type: boolean
        overallRiskLevel:
          type: string
        implementationStatus:
          type: string
        lastReviewed:
          type: ["string", "null"]
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEntry"
        isEscalated:
          type: boolean
        escalatedAt:
          type: ["string", "null"]
        riskDescription:
          type: string
        controlDescription:
          type: string
        inherentRiskScore:
          type: number
      required:
        - id
        - tenantId
        - department
        - departmentId
        - risk
        - riskId
        - control
        - controlOwner
        - implementationDate
        - residualRiskScore
        - withinAppetite
        - overallRiskLevel
        - implementationStatus
        - notes
        - timeline
        - isEscalated
        - riskDescription
        - controlDescription
        - inherentRiskScore

    ControlUpdate:
      type: object
      properties:
        implementationStatus:
          type: string
        controlOwner:
          type: string
        implementationDate:
          type: string
        residualRiskScore:
          type: number
        withinAppetite:
          type: boolean

    NoteInput:
      type: object
      required: [content, author]
      properties:
        content:
          type: string
        author:
          type: string

    Note:
      type: object
      properties:
        id:
          type: string
        controlId:
          type: string
        content:
          type: string
        author:
          type: string
        createdAt:
          type: string
      required: [id, controlId, content, author, createdAt]

    TimelineEntry:
      type: object
      properties:
        id:
          type: string
        action:
          type: string
        actor:
          type: string
        timestamp:
          type: string
        description:
          type: string
        result:
          type: string
      required: [id, action, actor, timestamp, description, result]

    ControlActionInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            - mark_complete
            - mark_in_progress
            - escalate
            - assign_owner
            - mark_reviewed
            - revert_to_draft
        assignee:
          type: string
        note:
          type: string
        actor:
          type: string

    ControlActionResult:
      type: object
      properties:
        success:
          type: boolean
        control:
          $ref: "#/components/schemas/Control"
        auditEntry:
          $ref: "#/components/schemas/AuditEntry"
      required: [success, control, auditEntry]

    AuditEntry:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        actor:
          type: string
        actorRole:
          type: string
        action:
          type: string
        item:
          type: string
        itemId:
          type: string
        timestamp:
          type: string
        result:
          type: string
        details:
          type: ["string", "null"]
      required:
        - id
        - tenantId
        - actor
        - actorRole
        - action
        - item
        - itemId
        - timestamp
        - result

    AuditLogPage:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required: [entries, total, page, pageSize]

    Report:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        description:
          type: string
        generatedAt:
          type: string
        period:
          type: string
        status:
          type: string
      required: [id, title, type, description, generatedAt, period, status]

    ReportDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        description:
          type: string
        generatedAt:
          type: string
        period:
          type: string
        status:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ReportSection"
        summary:
          type: string
        recommendations:
          type: array
          items:
            type: string
      required:
        - id
        - title
        - type
        - description
        - generatedAt
        - period
        - status
        - sections
        - summary
        - recommendations

    ReportSection:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        data:
          type: object
      required: [title, content]

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        department:
          type: string
        avatar:
          type: ["string", "null"]
        lastActive:
          type: string
      required: [id, name, email, role, department, lastActive]

    ActivityEntry:
      type: object
      properties:
        id:
          type: string
        actor:
          type: string
        actorRole:
          type: string
        action:
          type: string
        item:
          type: string
        itemId:
          type: string
        timestamp:
          type: string
        result:
          type: string
        severity:
          type: string
      required:
        - id
        - actor
        - actorRole
        - action
        - item
        - itemId
        - timestamp
        - result
        - severity

    ControlInput:
      type: object
      required: [tenantId, departmentId, risk, control]
      properties:
        tenantId:
          type: string
        departmentId:
          type: string
        department:
          type: string
        risk:
          type: string
        riskId:
          type: string
        control:
          type: string
        controlOwner:
          type: string
        implementationDate:
          type: string
        residualRiskScore:
          type: number
        inherentRiskScore:
          type: number
        withinAppetite:
          type: boolean
        overallRiskLevel:
          type: string
          enum: [High, Medium, Low]
        implementationStatus:
          type: string
          enum: [Implemented, In Progress, Overdue, Draft, Awaiting Review, Escalated]
        riskDescription:
          type: string
        controlDescription:
          type: string
        actor:
          type: string
        actorRole:
          type: string

    ControlFieldUpdate:
      type: object
      properties:
        risk:
          type: string
        control:
          type: string
        controlOwner:
          type: string
        implementationDate:
          type: string
        residualRiskScore:
          type: number
        inherentRiskScore:
          type: number
        withinAppetite:
          type: boolean
        overallRiskLevel:
          type: string
        implementationStatus:
          type: string
        riskDescription:
          type: string
        controlDescription:
          type: string
        actor:
          type: string
        actorRole:
          type: string

    ImportControlsInput:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          items:
            type: object
            required: [risk, control]
            properties:
              department:
                type: string
              risk:
                type: string
              control:
                type: string
              controlOwner:
                type: string
              implementationDate:
                type: string
